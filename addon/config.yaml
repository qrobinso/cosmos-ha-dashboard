name: Cosmos
version: "0.1.0"
slug: cosmos_dashboard
description: A beautiful wall dashboard for Home Assistant.
url: https://github.com/qrobinso/cosmos-ha-dashboard
arch:
  - amd64
  - aarch64
init: false
hassio_api: true
homeassistant_api: true
auth_api: true
mqtt: true
host_network: false
ingress: true
ingress_port: 8099
panel_icon: mdi:television-classic
panel_title: Cosmos
panel_admin: true
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: Cosmos web (kiosk + admin). Tablet displays connect here.
map:
  - addon_config:rw
options:
  log_level: info
schema:
  log_level: list(trace|debug|info|notice|warning|error|fatal)
image: ghcr.io/qrobinso/cosmos-dashboard-{arch}
