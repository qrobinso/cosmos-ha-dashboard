<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Cosmos">
  <title>Cosmos</title>
  <defs>
    <!-- Off-center radial: a faint pre-dawn light catching the upper-left of the field. -->
    <radialGradient id="cosmos-bg" cx="42%" cy="36%" r="78%">
      <stop offset="0%" stop-color="#1a2340"/>
      <stop offset="55%" stop-color="#0c111e"/>
      <stop offset="100%" stop-color="#06080f"/>
    </radialGradient>
    <!-- The crescent picks up moonlight blue, drifts through soft violet,
         and lands in aurora teal as it sweeps toward the warm star. -->
    <linearGradient id="cosmos-arc" x1="10%" y1="10%" x2="80%" y2="92%">
      <stop offset="0%" stop-color="#8fb6ef"/>
      <stop offset="45%" stop-color="#a8a6ff"/>
      <stop offset="100%" stop-color="#5fd3a3"/>
    </linearGradient>
    <!-- Soft halo so the warm dot reads as a star, not a sticker. -->
    <radialGradient id="cosmos-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd58a" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#f0c14b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f0c14b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Cosmic surface -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#cosmos-bg)"/>

  <!-- Halo bloom under the warm star -->
  <circle cx="44" cy="32" r="12" fill="url(#cosmos-halo)"/>

  <!-- Orbital crescent: the C of Cosmos, also a horizon at the edge of a world.
       Center (32,32), radius 18, opening on the right (-30°..+30°). -->
  <path d="M 47.59 23 A 18 18 0 1 0 47.59 41"
        fill="none"
        stroke="url(#cosmos-arc)"
        stroke-width="9"
        stroke-linecap="round"/>

  <!-- The warm star: a 2-disc fill so the hot center reads even at 16px. -->
  <circle cx="44" cy="32" r="4" fill="#ffd17a"/>
  <circle cx="44" cy="32" r="1.6" fill="#fff5db"/>
</svg>
